# L’app Next.js est dans web/ : sans base = "web", Netlify build depuis la racine et ne trouve pas l’app.
# Sans @netlify/plugin-nextjs, Netlify ne sait pas servir Next.js (SSR / App Router) → page 404 sur *.netlify.app.
#
# « Publish directory » dans l’UI ne doit PAS être « web » (identique à base → erreur plugin).
# publish est relatif à base : ici base = "web" → utiliser ".next", pas "web/.next" (sinon web/web/.next).
#
# Supabase : dans Netlify → Environment variables, au minimum :
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY, AUTH_SECRET
#   (+ OPENAI_API_KEY si chat bot)
#
[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Variables NEXT_PUBLIC_* sont incluses dans le bundle Next.js : le scan Netlify les traitait comme « fuites ».
  # Ce sont des valeurs volontairement exposées au navigateur (doc : https://ntl.fyi/configure-secrets-scanning )
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[plugins]]
  package = "@netlify/plugin-nextjs"
